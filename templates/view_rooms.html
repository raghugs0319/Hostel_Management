<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Rooms</title>

<style>
/* Reset & Body */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #ffffff;
    min-height: 100vh;
    color: #333;
}

/* Navbar */
.navbar {
    width: 100%;
    background: linear-gradient(135deg, #1E90FF, #00BFFF);
    padding: 15px 20px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    border-radius: 0 0 15px 15px;
    margin-bottom: 30px;
}

.navbar a {
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.navbar a:hover {
    background: #ffffff;
    color: #1E90FF;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* Page Heading */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1E90FF;
}

/* Table */
table {
    width: 90%;
    margin: 0 auto 30px auto;
    border-collapse: collapse;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

th, td {
    padding: 12px 15px;
    text-align: center;
    border-bottom: 1px solid #ddd;
    transition: all 0.3s ease;
}

th {
    background: #1E90FF;
    color: #fff;
    font-weight: bold;
}

tr:hover {
    background: #e0f0ff;
}

/* Image */
img {
    width: 80px;
    border-radius: 10px;
    transition: all 0.3s ease;
}

img:hover {
    transform: scale(1.1);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Links / Buttons */
a {
    padding: 6px 12px;
    border-radius: 8px;
    text-decoration: none;
    color: #fff;
    background: #1E90FF;
    transition: all 0.3s ease;
}

a:hover {
    background: #00BFFF;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Center Assign Room Link */
.center-link {
    text-align: center;
    margin-bottom: 50px;
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <a href="/dashboard/">Dashboard</a>
</div>

<!-- Page Heading -->
<h2>Rooms</h2>

<!-- Rooms Table -->
<table>
<tr>
<th>Room No</th>
<th>Type</th>
<th>Floor</th>
<th>Total Beds</th>
<th>Available Beds</th>
<th>Rent</th>
<th>Image</th>
<th>Members</th>
<th>Delete</th>
</tr>

{% for room in rooms %}
<tr>
<td>{{room.room_number}}</td>
<td>{{room.room_type}}</td>
<td>{{room.floor}}</td>
<td>{{room.total_beds}}</td>
<td>{{room.available_beds}}</td>
<td>{{room.rent}}</td>
<td><img src="{{room.room_image.url}}" alt="Room Image"></td>
<td><a href="{% url 'room_members' room.id %}">View</a></td>
<td><a href="{% url 'delete_room' room.id %}">Delete</a></td>
</tr>
{% endfor %}
</table>

<!-- Assign Room Link -->
<div class="center-link">
    <a href="{% url 'assign_room' %}">Assign Room</a>
</div>

</body>
</html>
