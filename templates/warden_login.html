<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warden Login</title>

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1E90FF, #00BFFF);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
}

/* Login Box */
.login-box {
    width: 350px;
    background: rgba(255,255,255,0.95);
    padding: 30px 25px;
    border-radius: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    text-align: center;
    animation: slideDown 0.8s ease forwards;
    transform: translateY(-50px);
    opacity: 0;
}

/* Animations */
@keyframes slideDown {
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

h2 {
    margin-bottom: 25px;
    color: #1E90FF;
    font-size: 1.8rem;
    font-weight: bold;
}

/* Input fields */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 1rem;
    transition: all 0.3s ease;
}

input:focus {
    border-color: #00BFFF;
    box-shadow: 0 0 10px #00BFFF;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border: none;
    border-radius: 50px;
    background: #1E90FF;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}

button:hover {
    background: #00BFFF;
    transform: translateY(-2px);
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    transition: all 0.5s ease;
}

button:hover::before {
    left: 100%;
}

/* Responsive */
@media(max-width:400px){
    .login-box {
        width: 90%;
        padding: 25px 20px;
    }
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Warden Login</h2>
    <form method="POST">
        {% csrf_token %}
        
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
